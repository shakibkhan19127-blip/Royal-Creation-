<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In | Royal Creation Billing</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/feather-icons"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <h1>Sign In</h1>
    <p class="subtitle">Enter your email and password to sign in</p>

    <form id="login-form" novalidate>
      <div class="form-group">
        <input type="email" id="email" class="form-control" placeholder="name@example.com" required autocomplete="email">
      </div>
      <div class="form-group password-wrap">
        <input type="password" id="password" class="form-control" placeholder="Password" required autocomplete="current-password" minlength="6">
        <button type="button" class="password-toggle" id="togglePass"><i data-feather="eye"></i></button>
      </div>

      <div class="toggle-row">
        <div class="toggle-switch active" id="rememberToggle"></div>
        <span>Remember me</span>
      </div>

      <button type="submit" class="btn btn-primary btn-block">Sign in</button>
    </form>

    <div class="divider">or</div>

    <button class="btn btn-google" id="googleSignIn">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" alt="">
      Sign in with Google
    </button>

    <p class="auth-footer">
      Don't have an account? <a href="signup.html">Sign up</a> · <a href="forgot-password.html">Forgot password?</a>
    </p>
  </div>
</div>

<script type="module">
import { auth, googleProvider } from './js/firebase-config.js';
import { signInWithEmailAndPassword, signInWithPopup, signInWithRedirect, getRedirectResult, setPersistence, browserLocalPersistence, browserSessionPersistence, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { showToast, showLoader, hideLoader } from './js/utils.js';

feather.replace();

(async () => {
  try {
    const result = await getRedirectResult(auth);
    if (result?.user) {
      showToast('Signed in with Google');
      window.location.replace('dashboard.html');
      return;
    }
  } catch (err) { if (err.code) console.error(err.code); }
  onAuthStateChanged(auth, (user) => { if (user) window.location.replace('dashboard.html'); });
})();

document.getElementById('togglePass').addEventListener('click', () => {
  const input = document.getElementById('password');
  input.type = input.type === 'password' ? 'text' : 'password';
});

const rememberToggle = document.getElementById('rememberToggle');
let remember = true;
rememberToggle.addEventListener('click', () => {
  remember = !remember;
  rememberToggle.classList.toggle('active');
});

function isValidEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!email) return showToast('Please enter your email', 'error');
  if (!isValidEmail(email)) return showToast('Invalid email format', 'error');
  if (!password || password.length < 6) return showToast('Password must be at least 6 characters', 'error');
  showLoader();
  try {
    await setPersistence(auth, remember ? browserLocalPersistence : browserSessionPersistence);
    await signInWithEmailAndPassword(auth, email, password);
    showToast('Login successful!');
    setTimeout(() => window.location.replace('dashboard.html'), 600);
  } catch (err) {
    let msg = 'Login failed';
    switch (err.code) {
      case 'auth/invalid-credential':
      case 'auth/wrong-password':
      case 'auth/user-not-found': msg = 'Incorrect email or password'; break;
      case 'auth/invalid-email': msg = 'Invalid email format'; break;
      case 'auth/user-disabled': msg = 'This account has been disabled'; break;
      case 'auth/too-many-requests': msg = 'Too many attempts. Try later or reset password.'; break;
      case 'auth/network-request-failed': msg = 'Network error. Check your internet.'; break;
      default: msg = err.message;
    }
    showToast(msg, 'error');
  } finally { hideLoader(); }
});

document.getElementById('googleSignIn').addEventListener('click', async () => {
  showLoader();
  try {
    await setPersistence(auth, remember ? browserLocalPersistence : browserSessionPersistence);
    await signInWithPopup(auth, googleProvider);
    showToast('Signed in with Google');
    setTimeout(() => window.location.replace('dashboard.html'), 500);
  } catch (err) {
    if (['auth/popup-blocked','auth/popup-closed-by-user','auth/cancelled-popup-request','auth/operation-not-supported-in-this-environment'].includes(err.code)) {
      try { await signInWithRedirect(auth, googleProvider); return; }
      catch (er) { showToast('Google sign-in failed: ' + er.message, 'error'); }
    } else if (err.code === 'auth/unauthorized-domain') {
      showToast('This domain is not authorized in Firebase Console → Authentication → Settings → Authorized Domains.', 'error');
    } else {
      showToast(err.message || 'Google sign-in failed', 'error');
    }
  } finally { hideLoader(); }
});
</script>
</body>
</html>
