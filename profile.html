<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/feather-icons"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
  <div id="sidebar-mount"></div>
  <main class="main-content">
    <div id="topbar-mount"></div>
    <div class="page-content">
      <div class="profile-grid">
        <form class="form-card" id="profileForm">
          <h2 class="page-title" style="margin-bottom:20px;">Edit Profile</h2>
          <h3 class="section-title">User Information</h3>
          <div class="form-grid">
            <div class="form-group"><label>Username</label><input type="text" class="form-control" id="username"></div>
            <div class="form-group"><label>Email</label><input type="email" class="form-control" id="email" readonly></div>
            <div class="form-group"><label>Birthdate</label><input type="date" class="form-control" id="birthdate"></div>
            <div class="form-group"><label>Mobile No.</label><input type="text" class="form-control" id="mobile"></div>
            <div class="form-group"><label>Profile Image</label><input type="file" class="form-control" id="profileImage" accept="image/*"></div>
            <div class="form-group"><label>Banner Img</label><input type="file" class="form-control" id="bannerImage" accept="image/*"></div>
          </div>
          <button type="submit" class="btn btn-dark"><i data-feather="save"></i> Update Profile</button>
        </form>
        <div class="profile-preview">
          <div class="profile-banner" id="bannerPrev"></div>
          <div class="profile-pic" id="profilePicPrev"><i data-feather="user"></i></div>
          <h3 id="prevName">User</h3>
          <p>Birth Date : <span id="prevBirth">-</span></p>
        </div>
      </div>
    </div>
  </main>
</div>
<script type="module">
import { auth, db } from './js/firebase-config.js';
import { doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { renderSidebar, renderTopbar, attachLogout } from './js/sidebar.js';
import { authGuard, setupSidebar, showToast, showLoader, hideLoader, formatDate, compressImage } from './js/utils.js';
let currentUser, profileUrl = '', bannerUrl = '';
(async () => {
  currentUser = await authGuard(auth);
  document.getElementById('sidebar-mount').innerHTML = renderSidebar('');
  document.getElementById('topbar-mount').innerHTML = renderTopbar(currentUser.displayName || 'User');
  feather.replace(); setupSidebar(); attachLogout();
  document.getElementById('email').value = currentUser.email;
  document.getElementById('username').value = currentUser.displayName || '';
  document.getElementById('prevName').textContent = currentUser.displayName || 'User';
  try {
    const snap = await getDoc(doc(db, 'users', currentUser.uid));
    if (snap.exists()) {
      const u = snap.data();
      if (u.username) document.getElementById('username').value = u.username;
      if (u.birthdate) { document.getElementById('birthdate').value = u.birthdate; document.getElementById('prevBirth').textContent = formatDate(u.birthdate); }
      if (u.mobile) document.getElementById('mobile').value = u.mobile;
      if (u.profileImage) { profileUrl = u.profileImage; document.getElementById('profilePicPrev').innerHTML = `<img src="${u.profileImage}" style="width:100%;height:100%;object-fit:cover;">`; }
      if (u.bannerImage) { bannerUrl = u.bannerImage; document.getElementById('bannerPrev').style.backgroundImage = `url(${u.bannerImage})`; }
    }
  } catch (e) {}
  document.getElementById('profileImage').addEventListener('change', (e) => upload(e, 'profile'));
  document.getElementById('bannerImage').addEventListener('change', (e) => upload(e, 'banner'));
  document.getElementById('username').addEventListener('input', e => document.getElementById('prevName').textContent = e.target.value);
  document.getElementById('birthdate').addEventListener('change', e => document.getElementById('prevBirth').textContent = formatDate(e.target.value));
  document.getElementById('profileForm').addEventListener('submit', save);
})();
async function upload(e, type) {
  const f = e.target.files[0]; if (!f) return;
  if (f.size > 2 * 1024 * 1024) { showToast('Max 2MB', 'error'); return; }
  showLoader();
  try {
    const url = await compressImage(f, type === 'banner' ? 1200 : 400, 0.85);
    if (type === 'profile') { profileUrl = url; document.getElementById('profilePicPrev').innerHTML = `<img src="${url}" style="width:100%;height:100%;object-fit:cover;">`; }
    else { bannerUrl = url; document.getElementById('bannerPrev').style.backgroundImage = `url(${url})`; }
    showToast('Uploaded');
  } catch (er) { showToast(er.message, 'error'); }
  finally { hideLoader(); }
}
async function save(e) {
  e.preventDefault();
  showLoader();
  try {
    const data = { username: document.getElementById('username').value, birthdate: document.getElementById('birthdate').value, mobile: document.getElementById('mobile').value, profileImage: profileUrl, bannerImage: bannerUrl, updatedAt: new Date().toISOString() };
    await setDoc(doc(db, 'users', currentUser.uid), data, { merge: true });
    if (data.username) await updateProfile(currentUser, { displayName: data.username });
    showToast('Profile updated');
  } catch (er) { showToast(er.message, 'error'); }
  finally { hideLoader(); }
}
</script>
</body>
</html>
