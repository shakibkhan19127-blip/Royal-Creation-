<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Company Details | Royal Creation Billing</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/feather-icons"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
  <div id="sidebar-mount"></div>
  <main class="main-content">
    <div id="topbar-mount"></div>
    <div class="page-content">
      <div class="page-header with-bg">
        <div>
          <h2 class="page-title">Company Detail Edit</h2>
          <div class="breadcrumb"><a href="dashboard.html">Home</a> / Company Detail Edit</div>
        </div>
        <a href="dashboard.html" class="btn btn-dark"><i data-feather="arrow-left"></i> Back</a>
      </div>

      <form id="companyForm" class="form-card">
        <div class="form-grid">
          <div class="form-group"><label>Logo</label><input type="file" class="form-control" id="logoFile" accept="image/*"><img id="logoPrev" style="max-width:100px; margin-top:8px; display:none; border:1px solid var(--border); padding:4px; border-radius:6px;"></div>
          <div class="form-group"><label>Sign <small style="color:var(--gray); text-transform:none;">(Background auto-removed)</small></label><input type="file" class="form-control" id="signFile" accept="image/*"><img id="signPrev" style="max-width:120px; margin-top:8px; display:none; background:#f1f5f9; padding:6px; border-radius:6px;"></div>
        </div>
        <div class="form-grid">
          <div class="form-group"><label>Top Title <small style="color:var(--gray);">(e.g., TAX INVOICE)</small></label><input type="text" class="form-control" id="topTitle" placeholder="TAX INVOICE"></div>
        </div>
        <div class="form-grid">
          <div class="form-group"><label>Name 01 <small style="color:var(--gray);">(First word of company name)</small></label><input type="text" class="form-control" id="name01" placeholder="ROYAL"></div>
          <div class="form-group"><label>Name 02 <small style="color:var(--gray);">(Second word — optional)</small></label><input type="text" class="form-control" id="name02" placeholder="CREATION"></div>
        </div>
        <div class="form-grid">
          <div class="form-group"><label>Sub Title</label><input type="text" class="form-control" id="subTitle" placeholder="Spl. In Smoking, Pintex, Peaco, Rka, Picot"></div>
          <div class="form-group"><label>Name Colour</label><input type="color" class="form-control" id="nameColor" value="#1e3a8a" style="height:46px"></div>
          <div class="form-group"><label>GSTIN</label><input type="text" class="form-control" id="gstin" placeholder="27ABCDE1234F1Z5"></div>
        </div>
        <div class="form-grid">
          <div class="form-group"><label>Mobile 01</label><input type="text" class="form-control" id="mobile01" placeholder=""></div>
          <div class="form-group"><label>Mobile 02</label><input type="text" class="form-control" id="mobile02" placeholder=""></div>
          <div class="form-group"><label>Email</label><input type="email" class="form-control" id="email" placeholder=""></div>
        </div>
        <div class="form-group"><label>Address</label><textarea class="form-control" id="address" placeholder="Enter your full company address"></textarea></div>
        <div class="form-group">
          <label>Bank Detail <small style="color:var(--gray); display:block; margin-top:4px;">Use the editor — exactly what you type/format will appear in the invoice PDF.</small></label>
          <div class="rich-editor" id="bankEditor"></div>
        </div>
        <button type="submit" class="btn btn-dark"><i data-feather="save"></i> Update Company</button>
      </form>
    </div>
  </main>
</div>

<script type="module">
import { auth, db } from './js/firebase-config.js';
import { doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { renderSidebar, renderTopbar, attachLogout } from './js/sidebar.js';
import { authGuard, setupSidebar, showToast, showLoader, hideLoader, compressImage, removeBackground } from './js/utils.js';
import { initRichEditor } from './js/rich-editor.js';

let currentUser, logoUrl = '', signUrl = '', bankEditor;

(async () => {
  currentUser = await authGuard(auth);
  document.getElementById('sidebar-mount').innerHTML = renderSidebar('company');
  document.getElementById('topbar-mount').innerHTML = renderTopbar(currentUser.displayName || 'User');
  feather.replace();
  setupSidebar();
  attachLogout();

  bankEditor = initRichEditor('bankEditor', '');

  try {
    const snap = await getDoc(doc(db, 'company', currentUser.uid));
    if (snap.exists()) {
      const c = snap.data();
      ['name01','name02','nameColor','gstin','mobile01','mobile02','email','address','topTitle','subTitle'].forEach(id => { if (c[id]) document.getElementById(id).value = c[id]; });
      if (c.bankDetail) bankEditor.setHTML(c.bankDetail);
      if (c.logoUrl) { logoUrl = c.logoUrl; const p=document.getElementById('logoPrev'); p.src=c.logoUrl; p.style.display='block'; }
      if (c.signUrl) { signUrl = c.signUrl; const p=document.getElementById('signPrev'); p.src=c.signUrl; p.style.display='block'; }
    }
  } catch (e) { console.log(e); }

  document.getElementById('logoFile').addEventListener('change', (e) => uploadFile(e, 'logo'));
  document.getElementById('signFile').addEventListener('change', (e) => uploadFile(e, 'sign'));
  document.getElementById('companyForm').addEventListener('submit', save);
})();

async function uploadFile(e, type) {
  const f = e.target.files[0]; if (!f) return;
  if (f.size > 2 * 1024 * 1024) { showToast('Max 2MB', 'error'); return; }
  showLoader();
  try {
    let url;
    if (type === 'sign') url = await removeBackground(f);
    else url = await compressImage(f, 800, 0.9);
    if (type === 'logo') { logoUrl = url; const p = document.getElementById('logoPrev'); p.src = url; p.style.display = 'block'; }
    else { signUrl = url; const p = document.getElementById('signPrev'); p.src = url; p.style.display = 'block'; }
    showToast(type === 'sign' ? 'Sign uploaded' : 'Logo uploaded');
  } catch (er) { showToast(er.message || 'Upload failed', 'error'); }
  finally { hideLoader(); }
}

async function save(e) {
  e.preventDefault();
  showLoader();
  try {
    const data = {};
    ['name01','name02','nameColor','gstin','mobile01','mobile02','email','address','topTitle','subTitle'].forEach(id => data[id] = document.getElementById(id).value);
    data.bankDetail = bankEditor.getHTML();
    data.logoUrl = logoUrl;
    data.signUrl = signUrl;
    data.updatedAt = new Date().toISOString();
    await setDoc(doc(db, 'company', currentUser.uid), data, { merge: true });
    showToast('Company updated');
  } catch (er) { showToast(er.message, 'error'); }
  finally { hideLoader(); }
}
</script>
</body>
</html>
