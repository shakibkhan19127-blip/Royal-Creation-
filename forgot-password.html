<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/feather-icons"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <h1>Forgot Password</h1>
    <p class="subtitle">Enter your email to reset your password</p>
    <form id="reset-form">
      <div class="form-group"><input type="email" id="email" class="form-control" placeholder="name@example.com" required></div>
      <button type="submit" class="btn btn-primary btn-block">Send Reset Email</button>
    </form>
    <p class="auth-footer"><a href="login.html">← Back to Login</a></p>
  </div>
</div>
<script type="module">
import { auth } from './js/firebase-config.js';
import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { showToast, showLoader, hideLoader } from './js/utils.js';
feather.replace();
document.getElementById('reset-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return showToast('Invalid email', 'error');
  showLoader();
  try { await sendPasswordResetEmail(auth, email); showToast('Reset email sent!'); }
  catch (err) { showToast(err.message, 'error'); }
  finally { hideLoader(); }
});
</script>
</body>
</html>
