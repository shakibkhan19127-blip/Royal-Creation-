<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice Create | Royal Creation Billing</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/feather-icons"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app-layout">
  <div id="sidebar-mount"></div>
  <main class="main-content">
    <div id="topbar-mount"></div>
    <div class="page-content">
      <div class="page-header with-bg">
        <div>
          <h2 class="page-title" id="pageTitle">Invoice Create</h2>
          <div class="breadcrumb"><a href="dashboard.html">Home</a> / Invoice Create</div>
        </div>
        <a href="invoice-list.html" class="btn btn-dark"><i data-feather="arrow-left"></i> Back</a>
      </div>

      <form id="invoiceForm">
        <div class="form-card">
          <div class="form-grid">
            <div class="form-group"><label>Invoice No</label><input type="text" class="form-control" id="invoiceNo" placeholder="Enter Invoice No" required></div>
            <div class="form-group"><label>Challan No</label><input type="text" class="form-control" id="challanNo" placeholder="Enter Challan No"></div>
            <div class="form-group"><label>Invoice Date</label><input type="date" class="form-control" id="invoiceDate" required></div>
          </div>
          <div class="form-group"><label>Vehicle No</label><input type="text" class="form-control" id="vehicleNo" placeholder="Enter Vehicle No"></div>
          <div class="form-group"><label>Total in Words</label><textarea class="form-control" id="totalWords" placeholder="Auto-calculated" readonly></textarea></div>
          <div class="form-grid">
            <div class="form-group"><label>IGST (%)</label><input type="number" class="form-control gst-input" id="igst" placeholder="0" min="0" step="0.01"></div>
            <div class="form-group"><label>CGST (%)</label><input type="number" class="form-control gst-input" id="cgst" placeholder="0" min="0" step="0.01"></div>
            <div class="form-group"><label>SGST (%)</label><input type="number" class="form-control gst-input" id="sgst" placeholder="0" min="0" step="0.01"></div>
          </div>
        </div>

        <div class="form-card" style="background: #f5f7ff;">
          <h3 class="section-title">Party Details</h3>
          <div class="form-grid">
            <div class="form-group"><label>Party's GSTIN</label><input type="text" class="form-control" id="partyGstin" placeholder="Enter Party's GSTIN"></div>
            <div class="form-group"><label>Party Name</label><input type="text" class="form-control" id="partyName" placeholder="Enter Name / Title"></div>
          </div>
          <div class="form-grid">
            <div class="form-group"><label>Place of Supply</label><input type="text" class="form-control" id="placeOfSupply" placeholder="Enter Place of Supply"></div>
            <div class="form-group">
              <label>State</label>
              <select class="form-control" id="state">
                <option value="">Select State</option>
                <option>Andhra Pradesh</option><option>Arunachal Pradesh</option><option>Assam</option>
                <option>Bihar</option><option>Chhattisgarh</option><option>Goa</option><option>Gujarat</option>
                <option>Haryana</option><option>Himachal Pradesh</option><option>Jharkhand</option>
                <option>Karnataka</option><option>Kerala</option><option>Madhya Pradesh</option>
                <option>Maharashtra</option><option>Manipur</option><option>Meghalaya</option>
                <option>Mizoram</option><option>Nagaland</option><option>Odisha</option><option>Punjab</option>
                <option>Rajasthan</option><option>Sikkim</option><option>Tamil Nadu</option><option>Telangana</option>
                <option>Tripura</option><option>Uttar Pradesh</option><option>Uttarakhand</option>
                <option>West Bengal</option><option>Delhi</option>
              </select>
            </div>
            <div class="form-group"><label>State Code</label><input type="text" class="form-control" id="stateCode" placeholder="Enter State Code"></div>
          </div>
        </div>

        <div class="form-card">
          <h3 class="section-title">Receiver's Signature <small style="text-transform:none; color:var(--gray); font-weight:400;">(Background auto-removed)</small></h3>
          <label class="upload-box" for="signFile">
            <i data-feather="upload-cloud"></i>
            <p>Click to upload signature</p>
            <small>JPG, PNG or JPEG (Max. 2MB)</small>
            <input type="file" id="signFile" accept="image/*" hidden>
          </label>
          <p id="signFileName" class="mt-2" style="font-size:13px; color:var(--gray);"></p>
          <img id="signPrev" style="max-height:80px; margin-top:8px; display:none; background:#f1f5f9; padding:6px; border-radius:6px;">
        </div>

        <div class="form-card">
          <h3 class="section-title">Particulars / Items</h3>
          <div style="overflow-x:auto;">
          <table class="items-table">
            <thead><tr><th style="width:60px">Sr No</th><th>Particulars</th><th style="width:100px">Qty</th><th style="width:120px">Rate</th><th style="width:140px">Amount</th><th style="width:60px">Action</th></tr></thead>
            <tbody id="itemsBody"></tbody>
          </table>
          </div>
          <button type="button" class="btn btn-dark mt-4" id="addRow"><i data-feather="plus-circle"></i> Add Row</button>

          <div style="margin-top:22px; padding:18px; background:var(--light-gray); border-radius:8px;">
            <div style="display:flex; justify-content:space-between; padding:4px 0;"><strong>Subtotal:</strong><span>₹ <span id="subtotal">0.00</span></span></div>
            <div style="display:flex; justify-content:space-between; padding:4px 0;">SGST:<span>₹ <span id="sgstAmt">0.00</span></span></div>
            <div style="display:flex; justify-content:space-between; padding:4px 0;">CGST:<span>₹ <span id="cgstAmt">0.00</span></span></div>
            <div style="display:flex; justify-content:space-between; padding:4px 0;">IGST:<span>₹ <span id="igstAmt">0.00</span></span></div>
            <hr style="margin:10px 0; border-color:#cbd5e1;">
            <div style="display:flex; justify-content:space-between; padding:4px 0; font-size:18px; color:var(--primary);"><strong>Invoice Total:</strong><strong>₹ <span id="invoiceTotal">0.00</span></strong></div>
          </div>
        </div>

        <div style="display:flex; gap:10px;">
          <button type="submit" class="btn btn-dark"><i data-feather="save"></i> Submit</button>
          <a href="invoice-list.html" class="btn btn-outline"><i data-feather="arrow-left"></i> Back</a>
        </div>
      </form>
    </div>
  </main>
</div>

<script type="module">
import { auth, db } from './js/firebase-config.js';
import { collection, addDoc, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { renderSidebar, renderTopbar, attachLogout } from './js/sidebar.js';
import { authGuard, setupSidebar, showToast, showLoader, hideLoader, generateInvoiceNo, numberToWords, formatINRZero, removeBackground } from './js/utils.js';

let currentUser, editId = null, signFileURL = '';

(async () => {
  currentUser = await authGuard(auth);
  document.getElementById('sidebar-mount').innerHTML = renderSidebar('invoice');
  document.getElementById('topbar-mount').innerHTML = renderTopbar(currentUser.displayName || currentUser.email.split('@')[0]);
  feather.replace();
  setupSidebar();
  attachLogout();

  document.getElementById('invoiceDate').value = new Date().toISOString().split('T')[0];
  document.getElementById('invoiceNo').value = generateInvoiceNo();
  addItemRow();

  const params = new URLSearchParams(location.search);
  if (params.get('id')) {
    editId = params.get('id');
    document.getElementById('pageTitle').textContent = 'Invoice Edit';
    await loadInvoice(editId);
  }

  document.getElementById('addRow').addEventListener('click', () => addItemRow());
  document.querySelectorAll('.gst-input').forEach(el => el.addEventListener('input', recalc));
  document.getElementById('signFile').addEventListener('change', async (e) => {
    const f = e.target.files[0]; if (!f) return;
    if (f.size > 2 * 1024 * 1024) { showToast('Max 2MB', 'error'); return; }
    document.getElementById('signFileName').textContent = `Selected: ${f.name}`;
    showLoader();
    try {
      signFileURL = await removeBackground(f);
      const prev = document.getElementById('signPrev');
      prev.src = signFileURL; prev.style.display = 'inline-block';
      showToast('Signature added');
    } catch (er) { showToast(er.message, 'error'); }
    finally { hideLoader(); }
  });
  document.getElementById('invoiceForm').addEventListener('submit', saveInvoice);
})();

function addItemRow(item = {}) {
  const tbody = document.getElementById('itemsBody');
  const idx = tbody.children.length + 1;
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td>${idx}</td>
    <td><input type="text" class="particulars" value="${item.particulars || ''}" placeholder="Enter Particulars"></td>
    <td><input type="number" class="qty" value="${item.qty || ''}" placeholder="0" min="0" step="0.01"></td>
    <td><input type="number" class="rate" value="${item.rate || ''}" placeholder="0" min="0" step="0.01"></td>
    <td><input type="number" class="amount" value="${item.amount || 0}" readonly></td>
    <td><button type="button" class="del-row"><i data-feather="trash-2"></i></button></td>
  `;
  tbody.appendChild(tr);
  tr.querySelector('.del-row').addEventListener('click', () => { tr.remove(); reindexRows(); recalc(); });
  ['qty', 'rate'].forEach(c => tr.querySelector('.' + c).addEventListener('input', () => {
    const q = +tr.querySelector('.qty').value || 0;
    const r = +tr.querySelector('.rate').value || 0;
    tr.querySelector('.amount').value = (q * r).toFixed(2);
    recalc();
  }));
  feather.replace();
}
function reindexRows() { document.querySelectorAll('#itemsBody tr').forEach((tr, i) => tr.children[0].textContent = i + 1); }
function recalc() {
  let subtotal = 0;
  document.querySelectorAll('#itemsBody tr').forEach(tr => { subtotal += +tr.querySelector('.amount').value || 0; });
  const cgst = (+document.getElementById('cgst').value || 0) * subtotal / 100;
  const sgst = (+document.getElementById('sgst').value || 0) * subtotal / 100;
  const igst = (+document.getElementById('igst').value || 0) * subtotal / 100;
  const total = subtotal + cgst + sgst + igst;
  document.getElementById('subtotal').textContent = formatINRZero(subtotal);
  document.getElementById('cgstAmt').textContent = formatINRZero(cgst);
  document.getElementById('sgstAmt').textContent = formatINRZero(sgst);
  document.getElementById('igstAmt').textContent = formatINRZero(igst);
  document.getElementById('invoiceTotal').textContent = formatINRZero(total);
  document.getElementById('totalWords').value = numberToWords(total);
}
async function loadInvoice(id) {
  showLoader();
  try {
    const snap = await getDoc(doc(db, 'invoices', id));
    if (!snap.exists()) { showToast('Not found', 'error'); return; }
    const inv = snap.data();
    ['invoiceNo','challanNo','invoiceDate','vehicleNo','partyGstin','partyName','placeOfSupply','state','stateCode','cgst','sgst','igst'].forEach(k => {
      if (inv[k] !== undefined && inv[k] !== null) document.getElementById(k).value = inv[k];
    });
    signFileURL = inv.signatureUrl || '';
    if (signFileURL) { const p = document.getElementById('signPrev'); p.src = signFileURL; p.style.display = 'inline-block'; }
    document.getElementById('itemsBody').innerHTML = '';
    (inv.items || []).forEach(it => addItemRow(it));
    if (!inv.items?.length) addItemRow();
    recalc();
  } catch (e) { showToast(e.message, 'error'); }
  finally { hideLoader(); }
}
async function saveInvoice(e) {
  e.preventDefault();
  showLoader();
  try {
    const items = [...document.querySelectorAll('#itemsBody tr')].map(tr => ({
      particulars: tr.querySelector('.particulars').value,
      qty: +tr.querySelector('.qty').value || 0,
      rate: +tr.querySelector('.rate').value || 0,
      amount: +tr.querySelector('.amount').value || 0
    })).filter(it => it.particulars || it.amount);
    const subtotal = items.reduce((s, i) => s + i.amount, 0);
    const cgst = +document.getElementById('cgst').value || 0;
    const sgst = +document.getElementById('sgst').value || 0;
    const igst = +document.getElementById('igst').value || 0;
    const cgstAmt = subtotal * cgst / 100;
    const sgstAmt = subtotal * sgst / 100;
    const igstAmt = subtotal * igst / 100;
    const total = subtotal + cgstAmt + sgstAmt + igstAmt;
    const data = {
      userId: currentUser.uid,
      invoiceNo: document.getElementById('invoiceNo').value,
      challanNo: document.getElementById('challanNo').value,
      invoiceDate: document.getElementById('invoiceDate').value,
      vehicleNo: document.getElementById('vehicleNo').value,
      partyGstin: document.getElementById('partyGstin').value,
      partyName: document.getElementById('partyName').value,
      placeOfSupply: document.getElementById('placeOfSupply').value,
      state: document.getElementById('state').value,
      stateCode: document.getElementById('stateCode').value,
      cgst, sgst, igst, cgstAmt, sgstAmt, igstAmt, subtotal,
      invoiceTotal: total,
      totalInWords: numberToWords(total),
      items, signatureUrl: signFileURL,
      updatedAt: new Date().toISOString()
    };
    if (editId) { await updateDoc(doc(db, 'invoices', editId), data); showToast('Invoice updated'); }
    else { data.createdAt = new Date().toISOString(); await addDoc(collection(db, 'invoices'), data); showToast('Invoice created'); }
    setTimeout(() => location.href = 'invoice-list.html', 700);
  } catch (er) { showToast(er.message, 'error'); }
  finally { hideLoader(); }
}
</script>
</body>
</html>
