<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Standard Layout Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
body { background:#f1f5f9; padding:20px; }
.preview-toolbar { background:white; padding:14px 22px; border-radius:12px; margin-bottom:18px; display:flex; gap:10px; flex-wrap:wrap; max-width:850px; margin:0 auto 20px; box-shadow:0 1px 2px rgba(0,0,0,0.05); }
.invoice-wrapper { display:flex; justify-content:center; padding:20px 0; overflow:hidden; }
.preview-stage { width:794px; }
@media print { .preview-toolbar { display:none !important; } body { background:white; padding:0; } }
@media (max-width:900px) { .preview-stage { transform:scale(0.46); transform-origin:top center; height:516px; } }
</style>
</head>
<body>
<div class="preview-toolbar">
  <a href="invoice-setting.html" class="btn btn-outline">← Back</a>
  <button class="btn btn-primary" onclick="window.print()">🖨 Print</button>
  <span style="margin-left:auto; align-self:center; font-weight:600;">Standard Royal Creation Layout</span>
</div>
<div class="invoice-wrapper" id="container"></div>
<script type="module">
import { auth, db } from './js/firebase-config.js';
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { renderInvoiceTemplate, getDemoInvoice } from './js/invoice-template.js';

onAuthStateChanged(auth, async (user) => {
  let company = {};
  if (user) {
    try {
      const snap = await getDoc(doc(db, 'company', user.uid));
      if (snap.exists()) company = snap.data();
    } catch (e) {}
  }
  document.getElementById('container').innerHTML = `<div class="preview-stage">${renderInvoiceTemplate(1, getDemoInvoice(), company)}</div>`;
});
</script>
</body>
</html>
