<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up | Royal Creation Billing</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/feather-icons"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <h1>Create Account</h1>
    <p class="subtitle">Sign up to start managing your invoices</p>
    <form id="signup-form" novalidate>
      <div class="form-group"><input type="text" id="username" class="form-control" placeholder="Username" required></div>
      <div class="form-group"><input type="email" id="email" class="form-control" placeholder="name@example.com" required></div>
      <div class="form-group password-wrap">
        <input type="password" id="password" class="form-control" placeholder="Password (min 6 chars)" required minlength="6">
        <button type="button" class="password-toggle" id="togglePass"><i data-feather="eye"></i></button>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Create Account</button>
    </form>
    <p class="auth-footer">Already have an account? <a href="login.html">Sign in</a></p>
  </div>
</div>

<script type="module">
import { auth, db } from './js/firebase-config.js';
import { createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { showToast, showLoader, hideLoader } from './js/utils.js';

feather.replace();
document.getElementById('togglePass').addEventListener('click', () => {
  const i = document.getElementById('password');
  i.type = i.type === 'password' ? 'text' : 'password';
});

document.getElementById('signup-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const username = document.getElementById('username').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  if (!username) return showToast('Please enter username', 'error');
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return showToast('Invalid email', 'error');
  if (password.length < 6) return showToast('Password must be at least 6 characters', 'error');
  showLoader();
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    await updateProfile(cred.user, { displayName: username });
    await setDoc(doc(db, 'users', cred.user.uid), { username, email, createdAt: new Date().toISOString() });
    showToast('Account created!');
    setTimeout(() => window.location.replace('dashboard.html'), 700);
  } catch (err) {
    let msg = err.message;
    if (err.code === 'auth/email-already-in-use') msg = 'This email is already registered';
    else if (err.code === 'auth/weak-password') msg = 'Password too weak (min 6 chars)';
    else if (err.code === 'auth/invalid-email') msg = 'Invalid email';
    showToast(msg, 'error');
  } finally { hideLoader(); }
});
</script>
</body>
</html>
